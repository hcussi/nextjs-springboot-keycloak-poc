spring:
  application:
    name: backend
  security:
    oauth2:
      resourceserver:
        jwt:
          # Single issuer used everywhere (see PLAN section 2). Spring fetches
          # the JWKS from this issuer to validate token signatures, and also
          # checks the `iss` claim and expiry.
          issuer-uri: ${KEYCLOAK_ISSUER:http://keycloak:8081/realms/web}

# The access token's `aud` claim must include this value (see SecurityConfig).
app:
  security:
    jwt:
      audience: ${JWT_AUDIENCE:nextjs-frontend}
    # Assurance level (acr claim) required by /server-details. Must be a key in
    # the realm's acr.loa.map (keycloak/realm-export.json); a rename there must be
    # mirrored here or /server-details is denied forever. Asserted by an
    # integration test.
    stepup:
      acr: ${STEPUP_ACR:pro}

server:
  port: 8080

name: Backend CI

# Runs the Spring Boot test suite on GitHub-hosted runners.
# The integration test (HelloControllerIntegrationTest) boots a real Keycloak
# via Testcontainers; ubuntu-latest ships with Docker, so no extra setup is needed.
#
# The workflow always triggers on PRs/pushes to main (no on:paths filter), but the
# actual `test` job only runs when backend files change. This keeps the required
# `test` status check reported on every PR: when nothing under backend/ changed the
# job is skipped, and GitHub treats a skipped required check as passing, so
# unrelated (e.g. docs-only) PRs are not blocked. A path filter at the on: level
# would instead never create the check and block merges on the required-check rule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit is pushed to the same ref.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  test:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/build/reports/tests/test
          if-no-files-found: ignore
